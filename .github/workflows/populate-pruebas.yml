name: Poblar rama pruebas con ECG candidatos

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/populate-pruebas.yml

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Descargar rama pruebas
        uses: actions/checkout@v4
        with:
          ref: pruebas
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Descargar y convertir ECG de taquicardia ventricular
        run: python tools/populate_vt_pruebas.py

      - name: Guardar resultado exclusivamente en pruebas
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ECG_BANCO_INICIAL_REAL/catalog/rhythms_catalog.json
          git add output/ECG_BANCO_INICIAL_REAL/catalog/rhythms_catalog.csv
          git add output/ECG_BANCO_INICIAL_REAL/candidates/ventricular_tachycardia_candidates.json
          git add -A output/ECG_BANCO_INICIAL_REAL/rhythms/vt_e*
          git add output/ECG_BANCO_INICIAL_REAL/viewer/data.js
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos."
            exit 0
          fi
          git commit -m "Cargar ECG de taquicardia ventricular candidatos en pruebas"
          git push origin HEAD:pruebas
