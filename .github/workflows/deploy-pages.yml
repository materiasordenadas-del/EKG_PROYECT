name: Publicar aplicación ECG y laboratorio de pruebas

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Construir candidatos y visor AFIB
        run: python tools/build_test_candidates.py

      - name: Preparar sitio estático
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/output _site/testing
          cp index.html _site/index.html
          cp -R output/ECG_BANCO_INICIAL_REAL _site/output/
          cp testing/index.html _site/testing/index.html
          cp testing/ABRIR_REVISION.html _site/testing/ABRIR_REVISION.html
          touch _site/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
