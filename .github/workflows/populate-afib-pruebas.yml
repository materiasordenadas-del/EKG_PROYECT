name: Cargar candidatos AFIB en pruebas

on:
  workflow_dispatch:
  push:
    branches:
      - pruebas
    paths:
      - tools/populate_afib_pruebas.py
      - output/ECG_BANCO_INICIAL_REAL/candidates/afib_candidates.json
      - .github/workflows/populate-afib-pruebas.yml

permissions:
  contents: write

concurrency:
  group: populate-afib-pruebas
  cancel-in-progress: false

jobs:
  populate:
    if: github.ref == 'refs/heads/pruebas'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama pruebas
        uses: actions/checkout@v4
        with:
          ref: pruebas
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Descargar y convertir los 20 ECG
        run: python tools/populate_afib_pruebas.py

      - name: Guardar señales en la rama pruebas
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ECG_BANCO_INICIAL_REAL/catalog/rhythms_catalog.json
          git add output/ECG_BANCO_INICIAL_REAL/rhythms/ecg_*
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos."
            exit 0
          fi
          git commit -m "Cargar 20 ECG AFIB candidatos en pruebas"
          git push origin HEAD:pruebas
